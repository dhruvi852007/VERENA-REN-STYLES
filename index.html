<!doctype html>
<html>
<head>
	<title> VERENA REN STYLES</title>

    <link rel="icon" type="image/png" href="verenalogo.png">
    
     <style>
       body {
    margin: 0;
    background-image: url("background.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    height: 100vh;
    font-family: sans-serif; /* Adding a clean font */
}

.logo-container {
    text-align: center;
    padding-top: 40px;
}

.categories {
    display: flex;
    justify-content: center;
    align-items: flex-start; /* Aligns them to the top of the flex container */
    gap: 40px;
    margin-top: 60px;
    flex-wrap: nowrap;
}

.category-card {
    text-decoration: none;
    text-align: center;
    color: black;
    transition: transform 0.3s ease;
}

.category-card img {
    width: 200px;
    height: 250px; /* Set a fixed height for consistency */
    object-fit: cover;
    border-radius: 15px;
    transition: 0.3s;
    display: block;
}

.category-card h3 {
    margin: 10px 0;
    font-size: 24px;
    font-weight: bold;
}

/* Hover Effects */
.category-card:hover {
    transform: translateY(-8px);
}

.category-card img:hover {
    transform: scale(1.05);
}
@media (max-width: 768px) {
    .categories {
        flex-direction: column; /* Stacks the 3 categories vertically */
        align-items: center;    /* Centers them on the screen */
        gap: 30px;              /* Adds space between the stacked cards */
        margin-top: 30px;
    }

    .category-card img {
        width: 80vw;   /* Makes the images wider to fit the phone screen */
        height: auto;  /* Maintains the correct proportions */
    }

    .logo-container img {
        width: 60%;    /* Shrinks the logo so it fits better on a phone */
    }
		 
    </style>
</head>

    <body>
    <div class="logo-container">
        <img src="verenalogo.png" alt="Verena logo">
    </div>

    <div class="categories">
        <a href="tshirt.html" class="category-card">
            <h3>T-shirts</h3>
            <img src="tshirt.jpg" alt="tshirt">
        </a>

        <a href="tops.html" class="category-card">
            <img src="top.jpg" alt="top">
            <h3>Tops</h3>
        </a>

        <a href="kurtis.html" class="category-card">
            <h3>Kurties</h3>
            <img src="kurti.jpg" alt="kurtis">
        </a>
    </div>

</body>
</html>
